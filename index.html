<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B 站收藏集下载器</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
      :root {
        --pink: #fb7299;
        --pink-dark: #e05c84;
        --pink-light: rgba(251, 114, 153, 0.08);
        --green: #52c41a;
        --bg: #f4f5f7;
        --card: #fff;
        --text: #18191c;
        --sub: #9499a0;
        --border: #e3e5e7;
        --radius: 12px;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: linear-gradient(135deg, #fb7299 0%, #ff9f8c 100%);
        color: #fff;
        padding: 18px 32px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 10px rgba(251, 114, 153, 0.35);
      }
      header .logo {
        font-size: 30px;
        line-height: 1;
      }
      header h1 {
        font-size: 20px;
        font-weight: 700;
      }
      header .sub {
        font-size: 12px;
        opacity: 0.85;
        margin-top: 2px;
      }

      /* ── Layout ── */
      .wrap {
        max-width: 860px;
        margin: 28px auto;
        padding: 0 18px;
      }

      /* ── Card ── */
      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 26px;
        margin-bottom: 18px;
      }
      .card-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 7px;
      }

      /* ── act_id input row ── */
      .id-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .id-row input {
        flex: 1;
        padding: 10px 13px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        color: var(--text);
        transition: border-color 0.15s;
      }
      .id-row input:focus {
        outline: none;
        border-color: var(--pink);
      }
      .hint {
        font-size: 12px;
        color: var(--sub);
        margin-top: 6px;
      }

      /* ── QR drop zone ── */
      .qr-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }
      .qr-label {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .qr-zone {
        border: 2px dashed var(--border);
        border-radius: 8px;
        padding: 24px;
        text-align: center;
        cursor: pointer;
        position: relative;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .qr-zone:hover,
      .qr-zone.over {
        border-color: var(--pink);
        background: var(--pink-light);
      }
      .qr-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }
      .qr-zone .icon {
        font-size: 30px;
        margin-bottom: 6px;
      }
      .qr-zone p {
        font-size: 13px;
        color: var(--sub);
        line-height: 1.6;
      }

      .qr-thumbs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      .qr-thumb {
        width: 70px;
        height: 70px;
        border: 1.5px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        position: relative;
      }
      .qr-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .qr-badge {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 10px;
        text-align: center;
        padding: 1px 0;
      }
      .qr-thumb.ok {
        border-color: var(--green);
      }
      .qr-thumb.fail {
        border-color: #ff4d4f;
      }

      /* ── Options ── */
      .opts-row {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
      .opts-label {
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
      }
      .chk-grp {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .chk-label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        cursor: pointer;
      }
      .chk-label input {
        width: 15px;
        height: 15px;
        accent-color: var(--pink);
        cursor: pointer;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 9px 22px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s,
          opacity 0.15s;
        white-space: nowrap;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: var(--pink);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--pink-dark);
      }
      .btn-primary:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }
      .btn-ghost {
        background: var(--border);
        color: var(--text);
      }
      .btn-ghost:hover {
        background: #d5d8dc;
      }
      .btn-green {
        background: var(--green);
        color: #fff;
        font-size: 12px;
        padding: 7px 14px;
      }
      .btn-green:hover {
        background: #389e0d;
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 18px;
        flex-wrap: wrap;
        gap: 8px;
      }

      /* ── Progress ── */
      .prog-wrap {
        display: none;
      }
      .prog-wrap.on {
        display: block;
      }
      .prog-bar-bg {
        height: 7px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .prog-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--pink), #ff9f8c);
        border-radius: 99px;
        width: 0;
        transition: width 0.35s;
      }
      .prog-text {
        font-size: 12px;
        color: var(--sub);
      }

      /* ── Alerts ── */
      .alert {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 7px;
        font-size: 12.5px;
        margin-bottom: 9px;
      }
      .alert-ok {
        background: #f6ffed;
        border: 1px solid #b7eb8f;
        color: #135200;
      }
      .alert-err {
        background: #fff2f0;
        border: 1px solid #ffccc7;
        color: #a8071a;
      }
      .alert-warn {
        background: #fffbe6;
        border: 1px solid #ffe58f;
        color: #613400;
      }

      /* ── Results ── */
      .results-wrap {
        display: none;
      }
      .results-wrap.on {
        display: block;
      }

      .result-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .coll-block {
        margin-bottom: 10px;
      }
      .coll-name {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .coll-sub {
        font-size: 12px;
        color: var(--sub);
        margin-bottom: 14px;
      }

      .dl-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .dl-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
        width: 100%;
      }
      .dl-item {
        display: flex;
        flex-direction: column;
        width: 150px;
        min-width: 120px;
        max-width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        margin-bottom: 0;
        padding: 0;
        overflow: hidden;
      }
      .dl-item-top {
        padding: 4px 6px 0 6px;
        border-bottom: 1px solid #f0f0f0;
        background: #fafbfc;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .dl-item-name {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        line-height: 1.2;
      }
      .dl-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 0;
      }
      .dl-tab {
        padding: 1px 7px;
        border-radius: 5px 5px 0 0;
        background: #f4f5f7;
        color: #888;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid #e3e5e7;
        border-bottom: none;
        transition:
          background 0.15s,
          color 0.15s;
        height: 20px;
        line-height: 18px;
      }
      .dl-tab.active {
        background: #fff;
        color: var(--pink);
        font-weight: 700;
        border-bottom: 1.5px solid #fff;
      }
      .dl-preview {
        width: 100%;
        aspect-ratio: 2 / 3;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-radius: 7px;
        border: 1px solid #eee;
        overflow: hidden;
      }
      .dl-preview img {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        background: #f8f8f8;
        display: block;
        border-radius: 0;
        border: none;
        position: static;
        margin: auto;
      }
      .dl-preview video {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        background: #f8f8f8;
        display: block;
        border-radius: 0;
        border: none;
      }
      .dl-links {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding: 0 14px 12px 14px;
      }

      .dl-a {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.15s;
      }
      .dl-a:hover {
        opacity: 0.8;
      }
      .dl-a-img {
        background: #e6f4ff;
        color: #1677ff;
      }
      .dl-a-vid {
        background: #f6ffed;
        color: #389e0d;
      }
      .dl-a-wm {
        background: #fff7e6;
        color: #d46b08;
      }

      /* ── Empty ── */
      .empty {
        text-align: center;
        padding: 36px 20px;
        color: var(--sub);
      }
      .empty .icon {
        font-size: 44px;
        margin-bottom: 10px;
      }
      .empty p {
        font-size: 14px;
      }

      footer {
        text-align: center;
        padding: 18px 20px;
        font-size: 11px;
        color: var(--sub);
      }

      @media (max-width: 560px) {
        header {
          padding: 14px 16px;
        }
        .wrap {
          padding: 0 12px;
        }
        .card {
          padding: 18px 16px;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  </head>
  <body>
    <header>
      <div class="logo">📦</div>
      <div>
        <h1>B 站收藏集下载器</h1>
        <div class="sub">输入 act_id 或上传二维码图片</div>
      </div>
    </header>

    <div class="wrap">
      <!-- ─── Input card ─── -->
      <div class="card">
        <div class="card-title">🔍 按 act_id 查询</div>

        <div class="id-row">
          <input
            type="text"
            id="act-id-input"
            placeholder="输入 act_id，例：13688"
          />
        </div>
        <div class="hint">
          💡 仅需提供 <code>act_id</code>，系统自动查询所有分组。也可直接粘贴含
          <code>act_id</code> 的完整链接或 b23.tv 短链接。
        </div>

        <!-- QR upload section -->
        <div class="qr-section">
          <div class="qr-label">📷 或上传二维码图片</div>
          <div class="qr-zone" id="qr-zone">
            <input type="file" id="qr-input" accept="image/*" multiple />
            <div class="icon">🖼️</div>
            <p>
              点击选择或拖放二维码图片<br /><small
                >支持 JPG / PNG，可多选；识别成功后自动填入 act_id 并查询</small
              >
            </p>
          </div>
          <div class="qr-thumbs" id="qr-thumbs"></div>
        </div>

        <!-- Options -->
        <div class="opts-row">
          <span class="opts-label">下载内容：</span>
          <div class="chk-grp">
            <label class="chk-label"
              ><input type="checkbox" id="opt-img" checked /> 🖼️ 图片</label
            >
            <label class="chk-label"
              ><input type="checkbox" id="opt-vid" checked /> 🎬
              无水印视频</label
            >
            <label class="chk-label"
              ><input type="checkbox" id="opt-wm" checked /> 💧
              带水印视频</label
            >
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="btn-start" onclick="startFetch()">
            🚀 获取下载链接
          </button>
          <button class="btn btn-ghost" onclick="clearAll()">🗑️ 清空</button>
        </div>
      </div>

      <!-- ─── Progress ─── -->
      <div class="card prog-wrap" id="prog-wrap">
        <div class="card-title">⏳ 处理中…</div>
        <div class="prog-bar-bg">
          <div class="prog-bar" id="prog-bar"></div>
        </div>
        <div class="prog-text" id="prog-text">正在获取数据…</div>
      </div>

      <!-- ─── Results ─── -->
      <div class="results-wrap" id="results-wrap">
        <div class="result-hdr">
          <div class="card-title" style="margin: 0">📋 下载结果</div>
          <div style="display: flex; align-items: center; gap: 10px">
            <div id="dl-type-chks" style="display: none; gap: 8px">
              <label class="chk-label"
                ><input type="checkbox" id="dl-chk-img" checked />🖼️</label
              >
              <label class="chk-label"
                ><input type="checkbox" id="dl-chk-vid" checked />🎬</label
              >
              <label class="chk-label"
                ><input type="checkbox" id="dl-chk-wm" checked />💧</label
              >
            </div>
            <button
              class="btn btn-green"
              id="btn-dl-all"
              style="display: none"
              onclick="downloadAll()"
            >
              ⬇️ 下载全部
            </button>
          </div>
          <!-- 下载进度 -->
            <div
              id="zip-progress-text"
              style="
                font-size: 12px;
                color: #888;
                min-height: 18px;
                text-align: right;
              "
            ></div>
        </div>
        <div id="alerts"></div>
        <div id="results-body"></div>
      </div>
    </div>

    <footer>B 站收藏集下载器 · 仅供学习研究，请遵守版权和用户协议</footer>

    <script>
      /* ============================================================
     State
  ============================================================ */
      const state = {
        allLinks: [], // { url: string, filename: string }
      };

      /* ============================================================
     QR code handling
  ============================================================ */
      const qrInput = document.getElementById("qr-input");
      const qrZone = document.getElementById("qr-zone");
      const qrThumbs = document.getElementById("qr-thumbs");

      qrInput.addEventListener("change", (e) => processQrFiles(e.target.files));

      qrZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        qrZone.classList.add("over");
      });
      qrZone.addEventListener("dragleave", () =>
        qrZone.classList.remove("over"),
      );
      qrZone.addEventListener("drop", (e) => {
        e.preventDefault();
        qrZone.classList.remove("over");
        processQrFiles(e.dataTransfer.files);
      });

      /**
       * Extract act_id from a raw string.
       * 1. If it's a URL with act_id in the query string, return it directly.
       * 2. If it's a bare number, return it directly.
       * 3. Otherwise (e.g. b23.tv short link), ask the backend to follow redirects
       *    and try extracting act_id from the final URL.
       */
      async function extractActId(text) {
        text = text.trim();
        // Direct URL with act_id param
        try {
          const actId = new URL(text).searchParams.get("act_id");
          if (actId) return actId;
        } catch (_) {}
        // Bare number
        if (/^\d+$/.test(text)) return text;
        // HTTP(S) URL without act_id — may be a short link; resolve via backend
        if (/^https?:\/\//i.test(text)) {
          try {
            const res = await fetch(
              `/api/resolve_url?url=${encodeURIComponent(text)}`,
            );
            const json = await res.json();
            if (json.code === 0 && json.url) {
              const actId = new URL(json.url).searchParams.get("act_id");
              if (actId) return actId;
            }
          } catch (_) {}
        }
        return null;
      }

      function processQrFiles(files) {
        Array.from(files).forEach((file) => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image();
            img.onload = async () => {
              const canvas = document.createElement("canvas");
              canvas.width = img.width;
              canvas.height = img.height;
              canvas.getContext("2d").drawImage(img, 0, 0);
              const imgData = canvas
                .getContext("2d")
                .getImageData(0, 0, img.width, img.height);
              const code = jsQR(imgData.data, imgData.width, imgData.height);

              // Add a "resolving…" placeholder badge while we await
              const thumb = document.createElement("div");
              thumb.className = "qr-thumb";
              const imgEl = document.createElement("img");
              imgEl.src = ev.target.result;
              thumb.appendChild(imgEl);
              const badge = document.createElement("div");
              badge.className = "qr-badge";
              badge.textContent = code ? "⏳ 解析中…" : "✗ 未识别";
              thumb.appendChild(badge);
              qrThumbs.appendChild(thumb);

              if (!code || !code.data) {
                thumb.classList.add("fail");
                return;
              }

              const actId = await extractActId(code.data);

              thumb.classList.add(actId ? "ok" : "fail");
              badge.textContent = actId ? "✓ act_id=" + actId : "✗ 无 act_id";

              if (actId) {
                document.getElementById("act-id-input").value = actId;
                startFetch();
              }
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      /* ============================================================
     API
  ============================================================ */
      async function fetchCollection(act_id, lottery_id) {
        const res = await fetch(
          `/api/fetch?act_id=${encodeURIComponent(act_id)}&lottery_id=${encodeURIComponent(lottery_id)}`,
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      /* ============================================================
     Parse API data
  ============================================================ */
      function parseData(data, opts) {
        const name = data.name || "未知收藏集";
        const map = new Map(); // card_name → { card_name, links[] }

        function processCard(card) {
          if (!card) return;
          const cn = card.card_name || "unnamed";
          if (!map.has(cn)) map.set(cn, { card_name: cn, links: [] });
          const entry = map.get(cn);

          if (opts.img && card.card_img)
            entry.links.push({
              url: card.card_img,
              label: "🖼️",
              cls: "dl-a-img",
              ext: "png",
            });

          if (opts.vid && card.video_list && card.video_list[0])
            entry.links.push({
              url: card.video_list[0],
              label: "🎬",
              cls: "dl-a-vid",
              ext: "mp4",
            });

          if (
            opts.wm &&
            card.video_list_download &&
            card.video_list_download[0]
          )
            entry.links.push({
              url: card.video_list_download[0],
              label: "💧",
              cls: "dl-a-wm",
              ext: "mp4",
            });
        }

        // processCardTypeInfo handles the collect_infos path whose card_type_info object
        // uses a different schema from card_info: name/overview_image/content.animation/watermark_animations.
        function processCardTypeInfo(cti) {
          if (!cti) return;
          const cn = cti.name || "unnamed";
          if (!map.has(cn)) map.set(cn, { card_name: cn, links: [] });
          const entry = map.get(cn);

          const img =
            cti.overview_image ||
            (cti.content &&
              cti.content.animation &&
              cti.content.animation.animation_first_frame) ||
            null;
          if (opts.img && img)
            entry.links.push({
              url: img,
              label: "🖼️",
              cls: "dl-a-img",
              ext: "png",
            });

          const vid =
            (cti.content &&
              cti.content.animation &&
              cti.content.animation.animation_video_urls &&
              cti.content.animation.animation_video_urls[0]) ||
            null;
          if (opts.vid && vid)
            entry.links.push({
              url: vid,
              label: "🎬",
              cls: "dl-a-vid",
              ext: "mp4",
            });

          const wm =
            (cti.watermark_animations &&
              cti.watermark_animations[0] &&
              cti.watermark_animations[0].watermark_animation) ||
            null;
          if (opts.wm && wm)
            entry.links.push({
              url: wm,
              label: "💧",
              cls: "dl-a-wm",
              ext: "mp4",
            });
        }

        (data.item_list || []).forEach(
          (item) => item && processCard(item.card_info),
        );

        const cl = data.collect_list || {};
        (cl.collect_infos || []).forEach((c) => {
          if (c && c.card_item && c.card_item.card_type_info)
            processCardTypeInfo(c.card_item.card_type_info);
        });

        return { name, cards: [...map.values()] };
      }

      /* ============================================================
     Progress helpers
  ============================================================ */
      function setProgress(pct, text) {
        document.getElementById("prog-bar").style.width = pct + "%";
        document.getElementById("prog-text").textContent = text;
      }
      function showProgress() {
        document.getElementById("prog-wrap").classList.add("on");
      }
      function hideProgress() {
        document.getElementById("prog-wrap").classList.remove("on");
      }

      /* ============================================================
     Alert helpers
  ============================================================ */
      function addAlert(cls, html) {
        const d = document.createElement("div");
        d.className = "alert " + cls;
        d.innerHTML = html;
        document.getElementById("alerts").appendChild(d);
      }
      function clearAlerts() {
        document.getElementById("alerts").innerHTML = "";
      }

      /* ============================================================
     Render results (no image preview — name + download links only)
  ============================================================ */
      function renderResults(collections) {
        const body = document.getElementById("results-body");
        body.innerHTML = "";
        state.allLinks = [];

        if (!collections.length) {
          body.innerHTML =
            '<div class="empty"><div class="icon">😕</div><p>未找到可下载内容</p></div>';
          return;
        }

        const safeName = (s) => s.replace(/[<>:"/\\|?*\s]/g, "_");

        for (const coll of collections) {
          const block = document.createElement("div");
          block.className = "coll-block card";
          block.innerHTML = `<div class=\"coll-name\">${escHtml(coll.name)}</div>
        <div class=\"coll-sub\">共 ${coll.cards.length} 个卡牌</div>`;

          const list = document.createElement("div");
          list.className = "dl-list";

          for (const card of coll.cards) {
            const item = document.createElement("div");
            item.className = "dl-item";

            // 顶部：标题+tab
            const top = document.createElement("div");
            top.className = "dl-item-top";

            const nm = document.createElement("div");
            nm.className = "dl-item-name";
            nm.title = card.card_name;
            nm.textContent = card.card_name;
            top.appendChild(nm);

            // tabs
            const tabs = document.createElement("div");
            tabs.className = "dl-tabs";
            // 收集类型
            const types = [];
            for (const dl of card.links) {
              if (dl.cls === "dl-a-img" && !types.includes("img"))
                types.push("img");
              if (dl.cls === "dl-a-vid" && !types.includes("vid"))
                types.push("vid");
              if (dl.cls === "dl-a-wm" && !types.includes("wm"))
                types.push("wm");
            }
            // tab标签
            const tabNames = { img: "🖼️", vid: "🎬", wm: "💧" };
            let activeType = types[0] || "img";
            types.forEach((type) => {
              const tab = document.createElement("div");
              tab.className = "dl-tab" + (type === activeType ? " active" : "");
              tab.textContent = tabNames[type] || type;
              tab.dataset.type = type;
              tab.onclick = () => {
                activeType = type;
                [...tabs.children].forEach((t) =>
                  t.classList.toggle("active", t.dataset.type === type),
                );
                renderPreview();
              };
              tabs.appendChild(tab);
            });
            top.appendChild(tabs);
            item.appendChild(top);

            // 预览区
            const preview = document.createElement("div");
            preview.className = "dl-preview";
            function renderPreview() {
              preview.innerHTML = "";
              let hasContent = false;
              // 去重：避免同一类型相同 URL 被渲染多次
              const seen = new Set();
              for (const dl of card.links) {
                const key = (dl.cls || "") + "|" + (dl.url || "");
                if (seen.has(key)) continue;
                seen.add(key);

                if (activeType === "img" && dl.cls === "dl-a-img") {
                  const img = document.createElement("img");
                  // 使用后端代理加载图片，避免浏览器长按保存为 HTML（代理需返回正确的 image/* Content-Type）
                  img.src = `/api/proxy_img?url=${encodeURIComponent(dl.url)}`;
                  img.alt = "图片预览";
                  img.loading = "lazy";
                  img.referrerPolicy = "no-referrer";
                  preview.appendChild(img);
                  hasContent = true;
                } else if (activeType === "vid" && dl.cls === "dl-a-vid") {
                  const video = document.createElement("video");
                  video.src = dl.url;
                  video.controls = true;
                  video.preload = "none";
                  preview.appendChild(video);
                  hasContent = true;
                } else if (activeType === "wm" && dl.cls === "dl-a-wm") {
                  const video = document.createElement("video");
                  video.src = dl.url;
                  video.controls = true;
                  video.preload = "none";
                  preview.appendChild(video);
                  hasContent = true;
                }
              }
              if (!hasContent) {
                preview.innerHTML =
                  '<span style="color:#bbb;font-size:13px;">无可用预览</span>';
              }
            }
            renderPreview();
            item.appendChild(preview);

            // 仅统计allLinks，不渲染底部按钮

            for (const dl of card.links) {
              let filename = safeName(card.card_name);
              // 如果是带水印视频，文件名结尾加“水印”
              if (dl.cls === "dl-a-wm") {
                filename += "-水印";
              }
              filename += "." + dl.ext;
              state.allLinks.push({
                url: dl.url,
                filename: filename,
                type: dl.cls, // 标记类型
                collectionFolder: safeName(coll.name || "未知合集"),
              });
            }

            list.appendChild(item);
          }

          block.appendChild(list);
          body.appendChild(block);
        }

        if (state.allLinks.length > 0) {
          document.getElementById("btn-dl-all").style.display = "inline-flex";
          document.getElementById("dl-type-chks").style.display = "flex";
          // 默认与上方选项同步
          document.getElementById("dl-chk-img").checked =
            document.getElementById("opt-img").checked;
          document.getElementById("dl-chk-vid").checked =
            document.getElementById("opt-vid").checked;
          document.getElementById("dl-chk-wm").checked =
            document.getElementById("opt-wm").checked;
        } else {
          document.getElementById("dl-type-chks").style.display = "none";
        }
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function isAppMode() {
        try {
          if (typeof window.pywebview !== "undefined") return true;
        } catch (e) {}
        try {
          const params = new URLSearchParams(location.search);
          if (params.get("app") === "1") return true;
        } catch (e) {}
        return false;
      }

      /* ============================================================
     Main: start fetch
  ============================================================ */
      async function startFetch() {
        const raw = document.getElementById("act-id-input").value.trim();
        const actId = await extractActId(raw);

        if (!actId) {
          clearAlerts();
          document.getElementById("results-wrap").classList.add("on");
          addAlert(
            "alert-warn",
            "⚠️ 请输入有效的 <code>act_id</code>（纯数字）、含 <code>act_id</code> 参数的完整链接，或 b23.tv 短链接。",
          );
          return;
        }

        const opts = {
          img: document.getElementById("opt-img").checked,
          vid: document.getElementById("opt-vid").checked,
          wm: document.getElementById("opt-wm").checked,
        };

        const btn = document.getElementById("btn-start");
        btn.disabled = true;
        showProgress();
        document.getElementById("results-wrap").classList.add("on");
        clearAlerts();
        document.getElementById("results-body").innerHTML = "";
        document.getElementById("btn-dl-all").style.display = "none";

        // Step 1: query all lottery groups for this act_id
        setProgress(10, `正在查询分组：act_id=${actId}…`);
        let allParams = [];
        try {
          const res = await fetch(
            `/api/get_params?act_id=${encodeURIComponent(actId)}`,
          );
          const json = await res.json();
          if (json.code !== 0) {
            addAlert(
              "alert-err",
              `❌ 分组查询失败 (act_id=${escHtml(actId)}): ${escHtml(String(json.message || json.code))}`,
            );
            setProgress(100, "完成");
            setTimeout(hideProgress, 900);
            btn.disabled = false;
            return;
          }
          allParams = json.data || [];
        } catch (err) {
          addAlert(
            "alert-err",
            `❌ 分组查询失败 (act_id=${escHtml(actId)}): ${escHtml(err.message || String(err))}`,
          );
          setProgress(100, "完成");
          setTimeout(hideProgress, 900);
          btn.disabled = false;
          return;
        }

        if (!allParams.length) {
          addAlert(
            "alert-warn",
            "⚠️ 未找到收藏集分组，请确认 act_id 是否正确。",
          );
          setProgress(100, "完成");
          setTimeout(hideProgress, 900);
          btn.disabled = false;
          return;
        }

        // collections 提升为全局变量，累加所有查询结果
        if (!window._allCollections) window._allCollections = [];
        const collections = window._allCollections;
        for (let i = 0; i < allParams.length; i++) {
          const p = allParams[i];
          setProgress(
            Math.round(10 + (90 * i) / allParams.length),
            `正在获取 act_id=${p.act_id} lottery_id=${p.lottery_id}…`,
          );
          try {
            const json = await fetchCollection(p.act_id, p.lottery_id);
            if (json.code !== 0) {
              addAlert(
                "alert-err",
                `❌ API 错误 (act_id=${escHtml(p.act_id)}): ${escHtml(String(json.message || json.code))}`,
              );
            } else {
              const result = parseData(json.data || {}, opts);
              collections.push(result);
              addAlert(
                "alert-ok",
                `✅ ${escHtml(result.name)} — ${result.cards.length} 个卡牌`,
              );
            }
          } catch (err) {
            addAlert(
              "alert-err",
              `❌ 获取失败 (act_id=${escHtml(p.act_id)}): ${escHtml(err.message || String(err))}`,
            );
          }
        }

        setProgress(100, "完成");
        setTimeout(hideProgress, 900);
        renderResults(collections);
        btn.disabled = false;
      }

      /* ============================================================
     Download all (open links sequentially)
  ============================================================ */
      // 批量下载所有资源（图片/视频）
      async function downloadAll() {
        const btn = document.getElementById("btn-dl-all");

        try {
          const btn = document.getElementById("btn-dl-all");

          btn.disabled = true;

          setZipProgress("准备下载...");
          if (!state.allLinks.length) {
            return;
          }

          const chkImg = document.getElementById("dl-chk-img").checked;
          const chkVid = document.getElementById("dl-chk-vid").checked;
          const chkWm = document.getElementById("dl-chk-wm").checked;

          const typeMap = {
            "dl-a-img": chkImg,
            "dl-a-vid": chkVid,
            "dl-a-wm": chkWm,
          };

          // =========================
          // URL 去重
          // =========================

          const seen = new Set();

          const links = state.allLinks.filter((link) => {
            if (!typeMap[link.type]) {
              return false;
            }

            let normalizedUrl = link.url;

            if (
              link.type === 'dl-a-vid' ||
              link.type === 'dl-a-wm'
            ) {
              normalizedUrl = link.url.split('?')[0];
            }

            const key =
              (link.collectionFolder || "未知合集") +
              "|" +
              link.type +
              "|" +
              normalizedUrl;

            if (seen.has(key)) {
              return false;
            }

            seen.add(key);

            return true;
          });

          if (!links.length) {
            alert("请至少选择一种资源类型");
            return;
          }

          // =========================
          // ZIP 路径（多合集分大文件夹，内部按类型分类）
          // =========================
          const typeFolderMap = {
            "dl-a-img": "img",
            "dl-a-vid": "video",
            "dl-a-wm": "watermark_video",
          };

          function withSuffix(filename, index) {
            const dotIndex = filename.lastIndexOf(".");
            if (dotIndex > 0) {
              const name = filename.slice(0, dotIndex);
              const ext = filename.slice(dotIndex);
              return `${name}(${index})${ext}`;
            }
            return `${filename}(${index})`;
          }

          const hasMultipleCollections =
            Array.isArray(window._allCollections) &&
            window._allCollections.length > 1;

          const usedZipPaths = new Set();
          for (const link of links) {
            const baseParts = [];
            if (hasMultipleCollections) {
              baseParts.push(link.collectionFolder || "未知合集");
            }
            baseParts.push(typeFolderMap[link.type] || "other");

            let index = 0;
            let fileName = link.filename;
            let zipPath = `${baseParts.join("/")}/${fileName}`;
            while (usedZipPaths.has(zipPath)) {
              index += 1;
              fileName = withSuffix(link.filename, index);
              zipPath = `${baseParts.join("/")}/${fileName}`;
            }
            usedZipPaths.add(zipPath);
            link.zipPath = zipPath;
          }

          // 应用模式下优先走后端按目录落盘
          if (isAppMode()) {
            try {
              let savedCount = 0;
              let failedCount = 0;
              let duplicateCount = 0;
              let rootDir = "";

              for (let i = 0; i < links.length; i++) {
                const link = links[i];
                setZipProgress(`正在保存 ${i + 1}/${links.length}：${link.filename}`);

                try {
                  const resp = await fetch("/api/save_file", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ item: link }),
                  });
                  const j = await resp.json();

                  if (j && j.code === 0) {
                    savedCount += 1;
                    if (j.duplicate) {
                      duplicateCount += 1;
                    }
                    if (j.root_dir) {
                      rootDir = j.root_dir;
                    }
                  } else {
                    failedCount += 1;
                    console.error("保存单文件失败:", j, link);
                  }
                } catch (err) {
                  failedCount += 1;
                  console.error("保存单文件异常:", err, link);
                }
              }

              if (savedCount > 0) {
                if (failedCount > 0) {
                  setZipProgress(
                    `已保存 ${savedCount}/${links.length}，去重 ${duplicateCount}，失败 ${failedCount}，目录：${rootDir || "downloads"}`,
                  );
                } else {
                  setZipProgress(`已保存 ${savedCount}/${links.length}，去重 ${duplicateCount}，目录：${rootDir || "downloads"}`);
                }
                return;
              }

              console.error("应用模式保存失败: 无文件保存成功");
              setZipProgress("应用目录保存失败，改为打包 ZIP...");
            } catch (err) {
              console.error("应用模式保存异常:", err);
              setZipProgress("应用目录保存失败，改为打包 ZIP...");
            }
          }

          // =========================
          // 创建 ZIP
          // =========================

          const zip = new JSZip();

          let done = 0;

          const CONCURRENT = 5;

          let index = 0;

          async function worker() {
            while (true) {
              const current = index++;

              if (current >= links.length) {
                return;
              }

              const link = links[current];

              try {
                setZipProgress(
                  `正在下载 ${done}/${links.length}：${link.filename}`,
                );
                let fetchUrl = link.url;

                // 图片走代理
                if (link.type === "dl-a-img") {
                  fetchUrl = `/api/proxy_img?url=${encodeURIComponent(link.url)}`;
                }

                const resp = await fetch(fetchUrl);

                if (!resp.ok) {
                  throw new Error(`HTTP ${resp.status}`);
                }

                const blob = await resp.blob();

                zip.file(link.zipPath || link.filename, blob);

                done++;
                
                console.log(`已添加 ${done}/${links.length}: ${link.filename}`);
              } catch (err) {
                console.error("下载失败:", link.filename, err);
              }
            }
          }

          // 并发下载
          await Promise.all(Array.from({ length: CONCURRENT }, () => worker()));

          // =========================
          // 生成 ZIP
          // =========================

          setZipProgress("正在生成压缩包...");

          const zipBlob = await zip.generateAsync(
            {
              type: "blob",
              compression: 'STORE', // 不压缩，直接打包，提升生成速度
            },
            (metadata) => {
              setZipProgress(`正在生成压缩包：${metadata.percent.toFixed(1)}%`);
            },
          );

          // =========================
          // ZIP 名字
          // =========================

          const typeNames = [];

          if (chkImg) {
            typeNames.push("图片");
          }

          if (chkVid) {
            typeNames.push("视频");
          }

          if (chkWm) {
            typeNames.push("水印视频");
          }

          const typeSuffix =
            typeNames.length === 3 ? "全部" : typeNames.join("+");

          let zipName = "B站收藏集";

          if (window._allCollections && window._allCollections.length === 1) {
            zipName = window._allCollections[0].name || zipName;
          } else if (
            window._allCollections &&
            window._allCollections.length > 1
          ) {
            zipName = `B站收藏集_${window._allCollections.length}个合集`;
          }

          const safeZipName = zipName.replace(/[<>:"/\\|?*]/g, "_").trim();

          const finalZipName = `${safeZipName}_${typeSuffix}.zip`;
          saveAs(zipBlob, finalZipName);

          setZipProgress("下载完成（ZIP）");

          btn.disabled = false;
        } finally {
          btn.disabled = false;
        }
      }

      /* ============================================================
     Clear all
  ============================================================ */
      function clearAll() {
        document.getElementById("act-id-input").value = "";
        document.getElementById("qr-thumbs").innerHTML = "";
        document.getElementById("qr-input").value = "";
        document.getElementById("results-body").innerHTML = "";
        document.getElementById("alerts").innerHTML = "";
        document.getElementById("results-wrap").classList.remove("on");
        document.getElementById("btn-dl-all").style.display = "none";
        hideProgress();
        state.allLinks = [];
        setZipProgress('');
      }
      function setZipProgress(text) {
        const el = document.getElementById("zip-progress-text");

        if (el) {
          el.textContent = text || "";
        }
      }
    </script>
  </body>
